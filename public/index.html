<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo Just Eats</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <nav class="navbar">
            <img src="/assets/images/theo_eats.png" alt="TJE Logo" class="logo">
            <h1>Theo Just Eats</h1>
        </nav>
    </header>
    <main>
        <section id="search-view" class="search-initial_state">
            <h2>The food you crave, delivered fast.</h2>
            <p>Find the first 10 restaurants and stores around you:</p>
            <div class="search-container">
                <form id="postcode-form" class="search-form">
                    <input
                        id="postcode-input"
                        type="search"
                        placeholder="Enter a UK postcode"
                        autocomplete="off"
                        required
                    />
                    <button id="search-bar-btn" type="submit">Search</button>
                </form>
                <p id="error-message"></p>
            </div>
        </section>
        <section id="results"></section>

    </main>
    <script src="app.js"></script>
</body>
</html>
